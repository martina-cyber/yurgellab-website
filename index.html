<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yurgel Lab</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    html, body { margin: 0; height: 100%; background: #0c2a47; }
  </style>
  <script>
    // Direciona para a versão desktop ou mobile (ambas protegidas por senha).
    (function () {
      var isMobile = window.matchMedia("(max-width: 768px)").matches
        || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      var target = isMobile ? "mobile.html" : "desktop.html";
      window.location.replace(target + window.location.hash);
    })();
  </script>
</head>
<body></body>
</html>
